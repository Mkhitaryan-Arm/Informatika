<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Թվային գրագիտություն և համակարգչային գիտություն</title>
<style>
:root{
  --primary:#4F46E5;
  --primary-dark:#4338CA;
  --primary-light:#EEF0FF;
  --bg:#F6F7FB;
  --card:#FFFFFF;
  --text:#1E2233;
  --muted:#6B7280;
  --border:#E7E9F3;
  --blue:#3B82F6;--blue-bg:#DBEAFE;
  --green:#10B981;--green-bg:#D1FAE5;
  --orange:#F59E0B;--orange-bg:#FEF3C7;
  --purple:#8B5CF6;--purple-bg:#EDE9FE;
  --yellow:#CA8A04;--yellow-bg:#FEF9C3;
  --red:#EF4444;--red-bg:#FEE2E2;
  --radius:16px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none!important;}
/* ---------- top landing nav ---------- */
.landing-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;line-height:1.2;}
.brand .logo{width:42px;height:42px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav-links{display:flex;gap:26px;font-size:14.5px;font-weight:500;color:#333;flex-wrap:wrap;}
.nav-links a.active{color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:4px;}
.btn{border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:var(--primary-light);color:var(--primary);}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:8px;}
/* ---------- hero ---------- */
.hero{display:flex;align-items:center;justify-content:space-between;gap:40px;padding:60px 60px 40px;max-width:1300px;margin:0 auto;flex-wrap:wrap;}
.hero-text{flex:1;min-width:300px;}
.badge-pill{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:14px;}
.hero h1{font-size:40px;line-height:1.25;margin:0 0 16px;}
.hero p{color:var(--muted);font-size:15.5px;line-height:1.7;max-width:520px;}
.hero-actions{display:flex;gap:14px;margin-top:20px;flex-wrap:wrap;}
.hero-art{flex:1;min-width:280px;display:flex;justify-content:center;}
.hero-art svg{width:100%;max-width:420px;}
.stats-bar{display:flex;justify-content:space-around;background:var(--primary-light);border-radius:18px;padding:22px 10px;max-width:1180px;margin:0 auto 60px;flex-wrap:wrap;gap:16px;}
.stat{text-align:center;min-width:90px;}
.stat .num{font-size:24px;font-weight:800;color:var(--primary-dark);}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600;}
.section-title{text-align:center;font-size:26px;font-weight:800;margin:50px 0 30px;}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:1180px;margin:0 auto 60px;padding:0 40px;}
.mcard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center;transition:.15s;}
.mcard:hover{box-shadow:0 8px 24px rgba(79,70,229,.12);transform:translateY(-2px);}
.micon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
.mcard h3{font-size:15px;margin:0 0 8px;min-height:42px;}
.mcard p{font-size:12.5px;color:var(--muted);margin:0 0 14px;min-height:34px;}
.mcard .count-pill{background:var(--primary-light);color:var(--primary);border:none;border-radius:20px;padding:8px 16px;font-size:12.5px;font-weight:700;width:100%;display:flex;justify-content:center;align-items:center;gap:6px;}
 
/* ---------- app shell (post login pages) ---------- */
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:230px;background:#fff;border-right:1px solid var(--border);padding:18px 14px;flex-shrink:0;}
.sidebar .brand{padding:6px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.sidenav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;font-size:14px;font-weight:600;color:#444;margin-bottom:4px;}
.sidenav a.active{background:var(--primary-light);color:var(--primary);}
.sidenav a:hover{background:var(--bg);}
.app-main{flex:1;min-width:0;}
.app-topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid var(--border);padding:14px 26px;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:40;}
.topbar-search{flex:1;max-width:360px;position:relative;}
.topbar-search input{width:100%;padding:9px 14px 9px 36px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:13.5px;}
.search-icon{position:absolute;left:11px;top:9px;opacity:.5;font-size:14px;}
.search-results{position:absolute;background:#fff;border:1px solid var(--border);border-radius:10px;width:100%;top:42px;box-shadow:0 10px 30px rgba(0,0,0,.08);z-index:60;max-height:300px;overflow:auto;}
.search-results .sr-item{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);cursor:pointer;}
.search-results .sr-item:hover{background:var(--primary-light);}
.topbar-right{display:flex;align-items:center;gap:18px;}
.bell{position:relative;font-size:19px;cursor:pointer;}
.bell .dot{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:10px;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.notif-panel{position:absolute;right:26px;top:58px;background:#fff;border:1px solid var(--border);border-radius:12px;width:320px;box-shadow:0 12px 30px rgba(0,0,0,.1);z-index:70;}
.notif-panel .ni{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.notif-panel .ni:last-child{border-bottom:none;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;cursor:pointer;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.role-pill{font-size:10.5px;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:700;}
.page{padding:26px;max-width:1180px;}
.page h1.pagetitle{font-size:24px;margin:0 0 4px;}
.page .sub{color:var(--muted);font-size:13.5px;margin:0 0 22px;}
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:12px;}
.stat-card .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stat-card .num{font-size:20px;font-weight:800;}
.stat-card .lbl{font-size:11.5px;color:var(--muted);}
.panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:22px;}
.panel h3{margin:0 0 16px;font-size:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
table th{text-align:right;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
table td{padding:10px 10px;border-bottom:1px solid var(--border);}
table th:first-child,table td:first-child{text-align:right;}
.progress-bar-track{background:var(--bg);border-radius:8px;height:8px;width:100%;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:8px;}
.input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:13.5px;font-family:inherit;background:#fff;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:#444;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.flex{display:flex;}
.gap8{gap:8px;}.gap12{gap:12px;}
.center{display:flex;align-items:center;justify-content:center;}
.between{display:flex;align-items:center;justify-content:space-between;}
/* topic / quiz */
.module-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.topic-list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;}
.topic-list-item:hover{border-color:var(--primary);}
.topic-list-item.done{background:var(--green-bg);}
.quiz-opt{display:block;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:13.5px;}
.quiz-opt:hover{border-color:var(--primary);}
.quiz-opt.selected{border-color:var(--primary);background:var(--primary-light);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-bg);}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-bg);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E2233;color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.2);}
.empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 0;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.auth-card{background:#fff;border-radius:18px;padding:36px;width:380px;border:1px solid var(--border);}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:22px;}
.auth-tabs button{flex:1;padding:9px;border-radius:8px;background:transparent;border:none;font-size:13.5px;font-weight:600;color:var(--muted);}
.auth-tabs button.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.hint-box{background:var(--primary-light);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--primary-dark);margin-top:14px;line-height:1.6;}
@media(max-width:780px){
  .sidebar{display:none;}
  .hero{padding:40px 20px;}
  .page{padding:18px;}
}
</style>
</head>
<body>
<div id="root"></div>
 
<script>
/* ============================ STORAGE LAYER ============================ */
/* Falls back to an in-memory store if window.storage isn't present in this
   environment (e.g. the file opened directly outside the Claude artifact
   sandbox). This guarantees the app always renders instead of crashing to
   a blank screen; persistence across reloads only happens when window.storage
   is actually available. */
const __mem = {};
function __hasStorage(){ return typeof window!== 'undefined' && window.storage && typeof window.storage.get==='function'; }
 
async function loadOrInit(key, defVal, shared){
  try{
    if(__hasStorage()){
      const r = await window.storage.get(key, shared);
      return JSON.parse(r.value);
    } else {
      const k = key+'::'+shared;
      if(!(k in __mem)) __mem[k] = JSON.stringify(defVal);
      return JSON.parse(__mem[k]);
    }
  }catch(e){
    try{
      if(__hasStorage()) await window.storage.set(key, JSON.stringify(defVal), shared);
      else __mem[key+'::'+shared] = JSON.stringify(defVal);
    }catch(e2){ /* ignore */ }
    return defVal;
  }
}
async function save(key, val, shared){
  try{
    if(__hasStorage()) await window.storage.set(key, JSON.stringify(val), shared);
    else __mem[key+'::'+shared] = JSON.stringify(val);
  }
  catch(e){ console.error('storage save failed', key, e); __mem[key+'::'+shared] = JSON.stringify(val); }
}
 
/* ============================ SEED DATA ============================ */
const seedUsers = [
  {username:'student1', password:'student123', fullName:'Անի Հակոբյան', role:'student'},
  {username:'teacher1', password:'teacher123', fullName:'Մարիամ Սարգսյան', role:'teacher'},
  {username:'admin', password:'admin123', fullName:'Համակարգի ադմին', role:'admin'},
];
 
function q(question, options, correct){ return {question, options, correct}; }
function topic(id, title, content, quiz){ return {id, title, content, quiz}; }
 
const seedModules = [
  {id:'m1', title:'Թվային գրագիտություն և անվտանգություն', desc:'Զգուշացիր և դաշանասիր քո տվյալները թվային աշխարհում։', icon:'🛡️', color:'blue', topics:[
    topic('m1t1','Թվային գրագիտության հիմունքները',
      'Թվային գրագիտությունը նշանակում է կարողանալ վստահ և անվտանգ կերպով օգտվել համակարգիչներից, համացանցից և թվային սարքերից։ Այն ընդգրկում է ֆայլերի կառավարում, տեղեկատվության որոնում և թվային գործիքների ճիշտ կիրառում։',
      q('Թվային գրագիտությունն առավելապես վերաբերում է...', ['Միայն խաղերին համակարգչում','Թվային սարքերից և համացանցից անվտանգ և արդյունավետ օգտվելու կարողությանը','Միայն ծրագրավորմանը','Միայն տպելու հնարավորությանը'],1)),
    topic('m1t2','Անվտանգ գաղտնաբառեր և տվյալների պաշտպանություն',
      'Հզոր գաղտնաբառը պետք է պարունակի մեծատառեր, փոքրատառեր, թվեր և նշաններ, և չպետք է կիրառվի մի քանի կայքերում միաժամանակ։ Կարևոր է նաև երբեք չկիսել գաղտնաբառերը այլոց հետ։',
      q('Ո՞րն է ամենաանվտանգ գաղտնաբառը?', ['12345678','MyName2010','Tr$7vK#92qLm','password'],2)),
    topic('m1t3','Համացանցում անվտանգ վարքագիծ',
      'Համացանցում պետք է զգուշանալ անհայտ հղումներից, չհրապարակել անձնական տվյալներ անծանոթների հետ և ստուգել կայքերի վստահելիությունը մինչև տվյալներ մուտքագրելը։',
      q('Ինչ պետք է անել, եթե անհայտ էլ.նամակում կա կասկածելի հղում?', ['Անմիջապես սեղմել հղումը','Ուղարկել ընկերներին','Չսեղմել և ստուգել ուղարկողին','Պատասխանել նամակին գաղտնաբառով'],2)),
  ]},
  {id:'m2', title:'Աղյուսակային գործիքներ', desc:'Սովորիր աշխատել տաղավարների, աղյուսակների, բլրուների հետ։', icon:'📊', color:'green', topics:[
    topic('m2t1','Աղյուսակի հիմունքները',
      'Աղյուսակը կազմված է տողերից և սյունակներից, որոնց հատման կետը կոչվում է բջիջ։ Յուրաքանչյուր բջիջ ունի իր եզակի հասցեն, օրինակ՝ A1, B2։',
      q('Ինչպես է կոչվում տողի և սյունակի հատման կետը?', ['Աղյուսակ','Բջիջ','Թերթիկ','Բանաձև'],1)),
    topic('m2t2','Բանաձևեր և ֆունկցիաներ',
      'Աղյուսակային ծրագրերում կարող ենք օգտագործել ֆունկցիաներ, ինչպիսիք են SUM (գումարում) և AVERAGE (միջին թվաբանական), ավտոմատ հաշվարկներ կատարելու համար։',
      q('=SUM(A1:A5) բանաձևը ի՞նչ է անում?', ['Հաշվում է A1-ից A5 բջիջների գումարը','Ջնջում է բջիջները','Հաշվում է միջինը','Ստեղծում է գրաֆիկ'],0)),
    topic('m2t3','Գրաֆիկներ և դիագրամներ',
      'Տվյալները տեսանելի դարձնելու համար օգտագործվում են գրաֆիկներ և դիագրամներ՝ սյունակային, գծային, շրջանաձև, որոնք հեշտացնում են համեմատությունն ու վերլուծությունը։',
      q('Ո՞ր դիագրամի տեսակն է հարմար ընդհանուրից տոկոսային բաշխումը ցույց տալու համար?', ['Գծային','Շրջանաձև (pie chart)','Սյունակային','Կետային'],1)),
  ]},

function allTopics(){ return DB.modules.flatMap(m=>m.topics.map(t=>({...t, moduleId:m.id, moduleTitle:m.title}))); }
function findModule(id){ return DB.modules.find(m=>m.id===id); }

/* ============================ INIT ============================ */
async function init(){
  try{
    DB.users = await loadOrInit('app:users', seedUsers, true);
    DB.modules = await loadOrInit('app:modules', seedModules, true);
    DB.feedback = await loadOrInit('app:feedback', [], true);
    DB.notifications = await loadOrInit('app:notifications', seedNotifications, true);
    try{
      let uname = null;
      if(__hasStorage()){
        const r = await window.storage.get('session:current', false);
        uname = JSON.parse(r.value);
      } else {
        uname = __mem['session:current::false'] ? JSON.parse(__mem['session:current::false']) : null;
      }
      const u = DB.users.find(x=>x.username===uname);
      if(u) CURRENT_USER = {username:u.username, fullName:u.fullName, role:u.role};
    }catch(e){ /* no session */ }
  }catch(err){
    console.error('init failed', err);
    DB.users = seedUsers; DB.modules = seedModules; DB.feedback = []; DB.notifications = seedNotifications;
  }
  render();
}
window.addEventListener('error', function(e){
  const root = document.getElementById('root');
  if(root && !root.innerHTML.trim()){
    root.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:0 auto;">'+
      '<h2>Մի փոքր խնդիր առաջացավ</h2><p style="color:#666;font-size:13px;">'+esc(String(e.message||e))+'</p>'+
      '<button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;border-radius:8px;border:none;background:#4F46E5;color:#fff;cursor:pointer;">Թարմացնել էջը</button></div>';
  }
});
 
/* ============================ AUTH ============================ */
async function doLogin(username, password){
  const u = DB.users.find(x=>x.username===username && x.password===password);
  if(!u){ STATE.authError='Սխալ մուտքանուն կամ գաղտնաբառ։'; render(); return; }
  CURRENT_USER = {username:u.username, fullName:u.fullName, role:u.role};
  await save('session:current', u.username, false);
  STATE.authError=''; STATE.page='home';
  render();
}
async function doRegister(fullName, username, password, role){
  if(!fullName || !username || !password){ STATE.authError='Խնդրում ենք լրացնել բոլոր դաշտերը։'; render(); return; }
  if(DB.users.some(u=>u.username===username)){ STATE.authError='Այս մուտքանունն արդեն գրանցված է։'; render(); return; }
  const u = {username, password, fullName, role};
  DB.users.push(u);
  await save('app:users', DB.users, true);
  CURRENT_USER = {username, fullName, role};
  await save('session:current', username, false);
  STATE.authError=''; STATE.page='home';
  render();
}
async function doLogout(){
  CURRENT_USER = null;
  await save('session:current', '', false);
  STATE.page='home'; STATE.userMenuOpen=false;
  render();
}

  window.scrollTo(0,0);
  render();
}

/* ---------- TOPIC VIEW (lesson) ---------- */
function topicView(){
  const found = findTopic(STATE.topicId);
  if(!found) return moduleView();
  const {topic:t, module:m} = found;
  const idx = m.topics.findIndex(x=>x.id===t.id);
  const prev = m.topics[idx-1], next = m.topics[idx+1];
  const cached = window.__progressCache ? window.__progressCache[CURRENT_USER.username] : {completedTopics:[]};
  const done = cached.completedTopics.includes(t.id);
  const qa = STATE.quizAnswers[t.id];
  const submitted = STATE.quizSubmitted===t.id;
  const body = `
  <div class="page" style="max-width:760px;">
    <a href="#" onclick="goto('moduleView',{moduleId:'${m.id}'});return false;" style="font-size:12.5px;color:var(--muted);">← ${esc(m.title)}</a>
    <h1 class="pagetitle" style="margin-top:10px;">${esc(t.title)}</h1>
    <div class="panel">
      <p style="line-height:1.85;font-size:14.5px;">${esc(t.content)}</p>
    </div>
    <div class="panel">
      <h3>📝 Ինքնաստուգման հարց</h3>
      <p style="font-weight:600;font-size:13.5px;margin-bottom:12px;">${esc(t.quiz.question)}</p>
      ${t.quiz.options.map((opt,i)=>{
        let cls='quiz-opt';
        if(submitted){
          if(i===t.quiz.correct) cls+=' correct';
          else if(qa===i) cls+=' wrong';
        } else if(qa===i) cls+=' selected';
        return `<div class="${cls}" onclick="${submitted?'':`STATE.quizAnswers['${t.id}']=${i};render();`}">${esc(opt)}</div>`;
      }).join('')}
      ${!submitted? `<button class="btn btn-primary btn-sm" style="margin-top:8px;" ${qa===undefined?'disabled':''} onclick="STATE.quizSubmitted='${t.id}';render();">Ստուգել պատասխանը</button>`
      : `<div style="margin-top:8px;font-size:13px;color:${qa===t.quiz.correct?'var(--green)':'var(--red)'};font-weight:600;">${qa===t.quiz.correct?'✓ Ճիշտ է!':'✗ Սխալ է, ճիշտ պատասխանը նշված է կանաչով։'}</div>`}
    </div>
    <div class="between" style="margin-top:6px;">
      <div>${prev?`<button class="btn btn-outline" onclick="STATE.quizSubmitted=false;goto('topicView',{moduleId:'${m.id}',topicId:'${prev.id}'})">← Նախորդ թեմա</button>`:''}</div>
      <div class="flex gap8">
        <button class="btn ${done?'btn-outline':'btn-ghost'}" onclick="markComplete('${m.id}','${t.id}')">${done?'✅ Ավարտված':'Նշել որպես ավարտված'}</button>
        ${next?`<button class="btn btn-primary" onclick="STATE.quizSubmitted=false;goto('topicView',{moduleId:'${m.id}',topicId:'${next.id}'})">Հաջորդ թեմա →</button>`:`<button class="btn btn-primary" onclick="goto('moduleView',{moduleId:'${m.id}'})">Ավարտել մոդուլը ✓</button>`}
      </div>
    </div>
  </div>`;
  return appShell(body);
}
 
async function markComplete(moduleId, topicId){
  const prog = window.__progressCache[CURRENT_USER.username] || {completedTopics:[]};
  if(!prog.completedTopics.includes(topicId)){
    prog.completedTopics.push(topicId);
    prog.lastActivity = {type:'topic', topicId, moduleId, date:new Date().toISOString()};
    window.__progressCache[CURRENT_USER.username]=prog;
    await saveProgress(CURRENT_USER.username, prog);
    showToast('Թեման նշվեց որպես ավարտված ✓');
  }
  render();
}

async function submitTest(moduleId){
  const m = findModule(moduleId);
  let score=0;
  m.topics.forEach(t=>{ if(STATE.quizAnswers[t.id]===t.quiz.correct) score++; });
  STATE.quizSubmitted = true;
  const results = window.__resultsCache[CURRENT_USER.username] || [];

/* ---------- PROGRESS PAGE ---------- */
function progressPage(){
  const prog = window.__progressCache[CURRENT_USER.username] || {completedTopics:[]};
  const results = window.__resultsCache[CURRENT_USER.username] || [];
  const totalTopics = allTopics().length;
  const completed = prog.completedTopics.length;
  const pct = totalTopics? Math.round(completed/totalTopics*100):0;
  const avgScore = results.length? Math.round(results.reduce((s,r)=>s+r.score/r.total*100,0)/results.length):0;
 
  const donutR=70, circ=2*Math.PI*donutR;
  const doneLen = circ*pct/100;
 
  const last7 = results.slice(-7);
  const chartW=540, chartH=200, pad=30;
  let chartSvg='<div class="empty">Դեռ թեստ չեք հանձնել</div>';
  if(last7.length){
    const maxScore = 100;
    const stepX = last7.length>1 ? (chartW-2*pad)/(last7.length-1) : 0;
    const pts = last7.map((r,i)=>{
      const pctScore = Math.round(r.score/r.total*100);
      const x = pad + i*stepX;
      const y = chartH-pad - (pctScore/maxScore)*(chartH-2*pad);
      return {x,y,pctScore};
    });
    const line = pts.map(p=>`${p.x},${p.y}`).join(' ');
    chartSvg = `<svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;height:200px;">
      ${[0,25,50,75,100].map(v=>{const y=chartH-pad-(v/100)*(chartH-2*pad); return `<line x1="${pad}" y1="${y}" x2="${chartW-pad}" y2="${y}" stroke="#EEF0F5"/><text x="2" y="${y+4}" font-size="9" fill="#9AA">${v}%</text>`}).join('')}
      <polyline points="${line}" fill="none" stroke="var(--primary)" stroke-width="2.5"/>
      ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--primary)"/>`).join('')}
    </svg>`;
  }
 
  const lastAct = prog.lastActivity;
  let lastActText = 'Դեռ ակտիվություն չկա';
  if(lastAct){
    if(lastAct.type==='topic'){ const tt=findTopic(lastAct.topicId); lastActText = `Ավարտեցիք «${esc(tt?tt.topic.title:'')}» թեման՝ ${new Date(lastAct.date).toLocaleDateString('hy-AM')}`; }
    else { lastActText = `Հանձնեցիք թեստը (${lastAct.score}/${lastAct.total}) ${new Date(lastAct.date).toLocaleDateString('hy-AM')}`; }
  }
 
  const body = `
  <div class="page">
    <h1 class="pagetitle">Իմ առաջընթացը</h1>
    <p class="sub">Հետևեք ձեր առաջընթացին և արդյունքներին</p>
    <div class="cards-row">
      <div class="stat-card"><div class="ic" style="background:var(--blue-bg);">📘</div><div><div class="num">${totalTopics}</div><div class="lbl">Ընդհանուր թեմաներ</div></div></div>
      <div class="stat-card"><div class="ic" style="background:var(--green-bg);">✅</div><div><div class="num">${completed}</div><div class="lbl">Ավարտված թեմաներ</div></div></div>
      <div class="stat-card"><div class="ic" style="background:var(--orange-bg);">📝</div><div><div class="num">${results.length}</div><div class="lbl">Հանձնված թեստեր</div></div></div>
      <div class="stat-card"><div class="ic" style="background:var(--purple-bg);">⭐</div><div><div class="num">${avgScore}%</div><div class="lbl">Միջին արդյունք</div></div></div>
    </div>
    <div class="row2">
      <div class="panel center" style="flex-direction:column;">
        <h3 style="align-self:flex-start;">Ընդհանուր առաջընթաց</h3>
        <svg viewBox="0 0 180 180" width="180" height="180">
          <circle cx="90" cy="90" r="${donutR}" fill="none" stroke="#EEF0F5" stroke-width="16"/>
          <circle cx="90" cy="90" r="${donutR}" fill="none" stroke="var(--primary)" stroke-width="16" stroke-dasharray="${doneLen} ${circ}" stroke-linecap="round" transform="rotate(-90 90 90)"/>
          <text x="90" y="84" text-anchor="middle" font-size="26" font-weight="800" fill="var(--text)">${pct}%</text>
          <text x="90" y="104" text-anchor="middle" font-size="10" fill="var(--muted)">ավարտված</text>
        </svg>
        <div style="font-size:12.5px;color:var(--muted);margin-top:8px;">${completed} / ${totalTopics} թեմա ավարտված</div>
      </div>
      <div class="panel">
        <h3>Մոդուլների առաջընթաց</h3>
        ${DB.modules.map(m=>{
          const d = m.topics.filter(t=>prog.completedTopics.includes(t.id)).length;
          const p = Math.round(d/m.topics.length*100);
          return `<div style="margin-bottom:12px;">
            <div class="between" style="font-size:12.5px;margin-bottom:5px;"><span>${m.icon} ${esc(m.title)}</span><b>${p}%</b></div>
            <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${p}%;background:var(--${m.color});"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="panel">
      <h3>Թեստերի արդյունքներ (վերջին ${last7.length})</h3>
      ${chartSvg}
    </div>
    <div class="panel">
      <h3>Վերջին ակտիվություն</h3>
      <div style="font-size:13px;color:var(--text);">${lastActText}</div>
    </div>
  </div>`;
  return appShell(body);
}

function exportCSV(){
  const rows = window.__teacherRows||[];

  rows.forEach(r=>{ csv += `"${r.fullName}","${r.username}",${r.completed},${r.testsTaken},${r.avg}\n`; });
  try{
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'students_results.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('CSV ֆայլը ներբեռնվեց ✓');

async function createTopic(){
  const moduleId = document.getElementById('ntModule').value;
  const title = document.getElementById('ntTitle').value.trim();
  const content = document.getElementById('ntContent').value.trim();
  const question = document.getElementById('ntQuestion').value.trim();
  const opts = [0,1,2,3].map(i=>document.getElementById('ntOpt'+i).value.trim());

  const m = findModule(moduleId);
  const id = moduleId+'t'+(m.topics.length+1)+'_'+Date.now();
  m.topics.push(topic(id, title, content, q(question, opts, correct)));
  await save('app:modules', DB.modules, true);
  DB.notifications.push({id:'n'+Date.now(), text:`Նոր թեմա ավելացվեց՝ «${title}» (${m.title})`, date:new Date().toISOString()});

  showToast('Թեման հաջողությամբ ստեղծվեց ✓');

}

/* ============================ MAIN RENDER ============================ */
async function ensureCaches(){
  if(!window.__progressCache) window.__progressCache = {};
  if(!window.__resultsCache) window.__resultsCache = {};
  if(CURRENT_USER && !window.__progressCache[CURRENT_USER.username]){
    window.__progressCache[CURRENT_USER.username] = await getProgress(CURRENT_USER.username);
  }
  if(CURRENT_USER && !window.__resultsCache[CURRENT_USER.username]){
    window.__resultsCache[CURRENT_USER.username] = await getResults(CURRENT_USER.username);
  }
}
 
async function render(){
  await ensureCaches();
  const root = document.getElementById('root');
  let html = '';
  const needsAuth = ['modules','tests','progress','teacherDash','adminDash','moduleView','topicView','testTake'];
  if(needsAuth.includes(STATE.page) && !CURRENT_USER){ STATE.page='auth'; }
  if(STATE.page!=='teacherDash' && STATE.page!=='adminDash'){
    switch(STATE.page){
      case 'home': html = home(); break;
      case 'about': html = about(); break;
      case 'modulesPublic': case 'modules': html = modulesPage(); break;
      case 'testsPublic': html = `${landingNav()}<div class="page" style="max-width:760px;margin:0 auto;"><h1 class="pagetitle">Թեստեր</h1><p class="sub">Մուտք գործեք՝ թեստերին մասնակցելու համար</p><button class="btn btn-primary" onclick="goto('auth')">🔑 Մուտք գործել</button></div>${footer()}`; break;
      case 'tests': html = testsPage(); break;
      case 'progress': html = progressPage(); break;
      case 'moduleView': html = moduleView(); break;
      case 'topicView': html = topicView(); break;
      case 'testTake': html = testTake(); break;
      case 'auth': html = authPage(); break;
      default: html = home();
    }
    root.innerHTML = html + (STATE.toast?`<div class="toast">${esc(STATE.toast)}</div>`:'');
  } else {
    root.innerHTML = '<div class="page center" style="min-height:100vh;">Բեռնում...</div>';
    const html2 = STATE.page==='teacherDash' ? await teacherDash() : await adminDash();
    root.innerHTML = html2 + (STATE.toast?`<div class="toast">${esc(STATE.toast)}</div>`:'');
  }
}
 
init();
</script>
</body>
